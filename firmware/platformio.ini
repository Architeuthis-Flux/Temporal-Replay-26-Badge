build_flags =
    ${env:echo.build_flags}
    ; -DBADGE_DEV_MENU
    ; -DNDEBUG
    ; -DBADGE_ALLOW_BADGE_INFO_EDIT
    ; -DBADGE_ENABLE_MP_DEV
    ; -DRELOAD_FILESYSTEM



