    ; -DBADGE_ENABLE_MP_DEV
    ; -DRELOAD_FILESYSTEM


; ── Echo Expanded — opt-in 16 MB layout with bigger OTA slots + ffat ──────
;
; Same firmware code as `echo`, but uses partitions_replay_16MB_ver2.csv
; which reclaims the unused 2 MB and grows:
;   - OTA app slots: 3.84 MB → 4.5 MB each (more headroom for future bloat)
;   - ffat:          6 MB    → 6.875 MB    (more room for WAD / assets / contacts)
;
; ⚠ NOT OTA-COMPATIBLE WITH THE DEFAULT `echo` BUILD.
; The partition table itself is at flash offset 0x8000 and is not
; rewritten by an OTA app-slot install. So a badge running an `echo`
; build can't simply pull a `firmware-echo-expanded.bin` and end up
; on the new layout — the partition table would still be the old one
; and the new firmware would mis-align ffat / overflow the smaller
; OTA slot.
;
; Use this env when you're flashing a fresh badge over USB and want
; the bigger layout from day one:
;
;   cd firmware && ./scripts/erase_and_flash_expanded.sh
;
; (The script does a full chip erase first, then `pio run -e
;  echo-expanded -t upload`, then `-t uploadfs`. A bare upload
;  without erase will leave the old partition table in place and
;  silently keep the old layout.)
;
; Future badges shipped from this point can use either env; existing
; deployed badges should stay on `echo` so OTA keeps working. See
; firmware/docs/OTA-MAINTAINER.md for the full migration story.

[env:echo-expanded]
extends = env:echo
board_build.partitions = partitions_replay_16MB_ver2.csv
build_flags =
    ${env:echo.build_flags}
    ; Compile-time marker for the expanded partition layout. Kept as
    ; a debugging breadcrumb only — runtime code detects the layout
    ; from the mounted ffat partition (see BadgeOTA::isExpandedPartitionLayout)
    ; and OTA serves the same firmware.bin to both layouts.
    -DBADGE_PARTITIONS_EXPANDED



