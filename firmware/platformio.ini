; PlatformIO Project Configuration File
;
; Hardware targets:
;   echo    — Temporal Badge ECHO rev (ESP32-S3-DevKitC-1-N16R8V) [default]
;   echo-dev — Echo board with internal debug menu enabled
;   delta   — Temporal Badge DELTA rev (ESP32-S3-MINI-1, XIAO form factor) [legacy]
;   charlie — Jumperless/Charlie board  (ESP32-S3-DevKitC-1-N16R8V)
;
; Build: pio run -e echo
; Flash: pio run -e echo -t upload
; Upload WAD/filesystem: pio run -e echo -t uploadfs
; Dev flash: pio run -e echo-dev -t upload --upload-port /dev/cu.usbmodem1101
; clangd: pio run -e echo -t compiledb
; (echo includes BADGE_HAS_DOOM; echo-doom remains as a compatibility alias)

[platformio]
boards_dir = boards
default_envs = echo-dev


; ── Shared settings ────────────────────────────────────────────────────────
[base]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
framework = arduino
monitor_filters = direct
board_build.filesystem = fatfs
board_build.embed_files =
    ../data/out/bundle.bin
extra_scripts =
    pre:scripts/inject_version.py
    pre:scripts/generate_build_wifi_config.py
    pre:scripts/generate_startup_files.py
build_src_filter =
    +<*>
    -<JumperlOSstuff/>
    -<modular/>
    -<ble/>
    +<../micropython/usermods/temporalbadge/>
build_flags_common =
    '-DFFCONF_H="ffconf.h"'
    -Imicropython/usermods/temporalbadge
    ; -DBOOP_DEBUG_RENDER         ; dev: one-line serial dump per render frame on Boop screen
    -DBADGE_BYPASS_PAIRING        ; dev: skip QR pairing gate so paired-only screens are reachable; REMOVE FOR SHIPPING FIRMWARE
    ; BLE proximity is compiled out for offline firmware. To restore it later,
    ; add -DBADGE_ENABLE_BLE_PROXIMITY and re-add +<ble/> to build_src_filter.
    ; ── Dev-only: force-refresh selected initial_filesystem files on every
    ; boot of this firmware. Comma-separated paths or prefixes (trailing
    ; `/` or `*` = prefix). Bypasses the user-edit preservation in
    ; provisionStartupFiles(). REMOVE for shipping firmware.
    ;
    ; The inner string MUST be wrapped in single quotes so SCons/the shell
    ; preserves the embedded double quotes (same convention as the
    ; '-DFFCONF_H="ffconf.h"' line above). Without the outer single
    ; quotes the macro expands to bare tokens and the build fails with
    ; "expected primary-expression before '/' token".
    ;
    ; Examples:
    ;'-DBADGE_DEV_FORCE_REFRESH="/apps/ir_remote/"'
    ; '-DBADGE_DEV_FORCE_REFRESH="/apps/ir_remote/,/lib/badge_ui.py"'



; ── Echo — Temporal Badge ECHO rev (production) ───────────────────────────────────────────
[env:echo]
extends = base
board = esp32-s3-devkitc-1-n16r8v
board_build.partitions = partitions_replay_16MB_doom.csv
board_build.f_cpu = 240000000L
; PlatformIO does not propagate board_build.embed_files via `extends`,
; so the bundle.bin embed has to be declared on every env that builds
; src/api/DataCache.cpp (which references _binary_bundle_bin_start /
; _binary_bundle_bin_end). Without this redeclaration the link fails
; with "undefined reference to _binary_bundle_bin_*".
board_build.embed_files =
    ../data/out/bundle.bin
    build_assets/partitions_ver2.bin
extra_scripts =
    ${base.extra_scripts}
    pre:scripts/upload_doom_wad.py
    pre:scripts/gen_expanded_partitions.py
    post:scripts/normalize_bundle_symbols.py
; Match QA firmware for Echo: keep the ESP32-S3 hardware USB CDC/JTAG mode,
; but expose Serial on USB as soon as the app firmware boots.
build_unflags =
    -DARDUINO_USB_CDC_ON_BOOT=0
build_flags =
    ${base.build_flags_common}
    -DHARDWARE_ECHO
    -DBADGE_HAS_DOOM
    -DFEATURE_SOUND
    -DARDUINO_USB_CDC_ON_BOOT=1
    -Ilib/doomgeneric/src
    -DDOOMGENERIC_RESX=160
    -DDOOMGENERIC_RESY=100

    ; OTA configuration. Override per-fork to point the daily release
    ; check at a different repository or to look for a different asset
    ; filename in the GitHub release. See firmware/docs/OTA-MAINTAINER.md.
    '-DOTA_GITHUB_REPO="Architeuthis-Flux/Temporal-Replay-26-Badge"'
    '-DOTA_ASSET_NAME="firmware.bin"'

    ;echo-dev flags, we're just gonna have a single env now. So echo is echo-dev.
    -DBADGE_DEV_MENU
    -DNDEBUG
    -DBADGE_ALLOW_BADGE_INFO_EDIT
    -DBADGE_ENABLE_MP_DEV
    -DRELOAD_FILESYSTEM


build_src_filter =
    ${base.build_src_filter}
    +<../lib/doomgeneric/src/>
lib_deps =
    adafruit/Adafruit IS31FL3731 Library@^2.0.2
    sparkfun/SparkFun LIS2DH12 Arduino Library@^1.0.3
    olikraus/U8g2@^2.35.19
    bblanchon/ArduinoJson@^6.21.5


