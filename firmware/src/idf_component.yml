## ESP-IDF Component Manager manifest for the badge `main` component.
##
## Mirrors the dependency set already locked in firmware/dependencies.lock
## (which was previously generated by pioarduino) and adds the arduino-esp32
## core itself, since with the native idf.py build there is no implicit
## "framework = arduino" injecting it.
##
## NOTE: arduino-esp32 currently constrains `idf: '>=5.3,<5.6'`. The local
## install at /Users/mpacheco/.espressif/v5.5.3 satisfies this.

dependencies:
  idf: ">=5.3,<5.6"

  # arduino-esp32 itself is provided as a local component at
  # firmware/components/arduino/ (symlink to pioarduino's framework-arduinoespressif32),
  # so it is NOT declared here. Local components in the project tree always
  # take precedence over registry/managed deps with the same name.

  # Re-state the existing managed deps so the manager doesn't drop them
  # if it sees a fresh manifest.
  chmorgan/esp-libhelix-mp3: "==1.0.3"
  espressif/cbor: "==0.6.1~4"
  espressif/esp-dsp: "==1.8.0"
  espressif/esp-modbus: "==1.0.18"
  espressif/esp-sr: "==2.4.3"
  espressif/esp-zboss-lib: "==1.6.4"
  espressif/esp-zigbee-lib: "==1.6.8"
  espressif/esp_diag_data_store: "==1.0.2"
  espressif/esp_diagnostics: "==1.2.1"
  espressif/esp_insights: "==1.2.2"
  espressif/esp_modem: "==2.0.1"
  espressif/esp_rainmaker: "==1.5.2"
  espressif/libsodium: "==1.0.22"
  espressif/mdns: "==1.11.1"
  espressif/network_provisioning: "==1.0.2"
  espressif/qrcode: "==0.1.0~2"
  espressif/rmaker_common: "==1.4.6"
  joltwallet/littlefs: "==1.21.1"
