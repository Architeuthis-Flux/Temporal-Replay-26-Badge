name: release-firmware

# Builds the production firmware.bin and attaches it to a GitHub
# release as `firmware-echo.bin`. The badge's BadgeOTA module looks
# for exactly that asset name on the latest release of this repo (see
# OTA_GITHUB_REPO + OTA_ASSET_NAME in firmware/platformio.ini).
#
# Triggers:
#   - Automatically when a release is published.
#   - Manually via the Actions tab (workflow_dispatch).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach the asset to (must already exist)"
        required: true

permissions:
  contents: write   # needed to attach the .bin to the release

jobs:
  build:
    name: Build & attach firmware-echo.bin
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache PlatformIO core + toolchains
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: pio-${{ runner.os }}-${{ hashFiles('firmware/platformio.ini') }}
          restore-keys: |
            pio-${{ runner.os }}-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          python -m pip install platformio

      - name: Build firmware (echo env)
        env:
          # No WiFi credentials baked into the public release. Users
          # configure WiFi at runtime via Settings → WiFi Setup, and
          # the BuildWifiConfig generator handles missing env vars.
          BADGE_ALLOW_MISSING_DOOM_WAD: "1"
        run: |
          cd firmware
          # Provision a default settings.txt so build.sh / generators
          # have something to read.
          [ -f settings.txt ] || cp settings.txt.example settings.txt
          pio run -e echo

      - name: Stage release asset
        run: |
          mkdir -p artifacts
          cp firmware/.pio/build/echo/firmware.bin artifacts/firmware-echo.bin
          ls -lh artifacts/

      - name: Determine release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload firmware-echo.bin to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: artifacts/firmware-echo.bin
          fail_on_unmatched_files: true
